<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Details | FF Arena</title>

    <link rel="stylesheet" href="../assets/css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body {
            background: var(--bg-dark);
            padding-top: 80px;
            margin: 0;
        }

        .public-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .box {
            background: rgba(20, 22, 30, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 22px;
        }

        .title {
            font-size: 2.2rem;
            font-family: var(--font-heading);
            margin: 0;
        }

        .meta {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.6;
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .chip {
            border: 1px solid var(--border-glass);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 18px;
        }

        .panel {
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
        }

        .panel h3 {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .muted {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .mono {
            font-family: var(--font-mono);
        }

        @media (max-width: 780px) {
            .grid2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="public-nav">
        <a href="../index.html" class="logo">FF <span class="text-gradient">ARENA</span></a>
        <div style="display:flex; gap: 12px;">
            <a href="./tournament.html" class="cyber-btn" style="padding: 8px 18px; font-size: 0.8rem;">All
                Tournaments</a>
            <a href="../user/user-dashboard.html" class="cyber-btn"
                style="padding: 8px 18px; font-size: 0.8rem;">Dashboard</a>
        </div>
    </nav>

    <main class="container animate-fade-up">
        <div class="box" id="detailsBox">Loading...</div>
    </main>

    <script type="module" src="./tournament-details.js"></script>
</body>

</html>
