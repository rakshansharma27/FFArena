<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - FF Arena</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: var(--bg-dark);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .error-container {
      max-width: 600px;
      padding: 40px;
      position: relative;
      z-index: 10;
    }

    .glitch {
      font-family: var(--font-heading);
      font-size: 8rem;
      font-weight: 900;
      color: #fff;
      position: relative;
      margin-bottom: 10px;
      line-height: 1;
      text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
    }

    /* Simple glitch effect using text-shadows */
    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }

    .glitch::before {
      color: #00f2fe;
      z-index: -1;
      transform: translate(-5px, 2px);
    }

    .glitch::after {
      color: #ff0055;
      z-index: -2;
      transform: translate(5px, -2px);
    }

    .error-msg {
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 15px;
      font-family: var(--font-heading);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .error-desc {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="error-container animate-fade-up">
    <div class="glitch">404</div>
    <div class="error-msg text-gradient">Zone is Shrinking!</div>
    <p class="error-desc">You've wandered outside the safe zone. The page you are looking for has been eliminated or
      does not exist.</p>

    <a href="index.html" class="cyber-btn">
      <i class="fas fa-home"></i> Return to Lobby
    </a>
  </div>

</body>

</html>
