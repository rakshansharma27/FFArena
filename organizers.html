<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified Organizers - FF Arena</title>
    <link rel="stylesheet" href="../assets/css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            padding-top: 80px;
        }

        .public-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .org-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .org-card {
            background: rgba(20, 22, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .org-banner {
            height: 100px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .org-logo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            border: 3px solid var(--bg-dark);
            position: absolute;
            bottom: -40px;
            left: 20px;
            background: #000;
            object-fit: cover;
        }

        .org-info {
            padding: 50px 20px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .org-name {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .verified-badge {
            color: #00f2fe;
            font-size: 1rem;
        }

        .tier {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            background: rgba(0, 242, 254, 0.12);
            border: 1px solid rgba(0, 242, 254, 0.22);
            color: #00f2fe;
        }

        .muted {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <nav class="public-nav">
        <a href="../index.html" class="logo">FF <span class="text-gradient">ARENA</span></a>
        <div style="display:flex; gap: 15px;">
            <a href="apply.html" class="cyber-btn"
                style="padding: 8px 20px; font-size: 0.8rem; border-color: #aa00ff; color: #aa00ff;">Host
                Tournaments</a>
        </div>
    </nav>

    <main class="container animate-fade-up">
        <div class="header-section delay-1">
            <h1 class="text-gradient">Tournament Organizers</h1>
            <p style="color: var(--text-muted);">Compete in the best events hosted by our verified partners.</p>
        </div>

        <div class="org-grid delay-2" id="org-grid">
            <div style="color: var(--text-muted); padding: 10px;">Loading organizers...</div>
        </div>
    </main>

    <script type="module" src="./organizers.js"></script>
</body>

</html>
