<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Profile | FF Arena</title>
    <link rel="stylesheet" href="../assets/css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            padding-top: 60px;
        }

        .public-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .profile-header {
            position: relative;
            margin-bottom: 60px;
        }

        .banner {
            width: 100%;
            height: 260px;
            background: linear-gradient(rgba(0, 242, 254, 0.12), rgba(0, 0, 0, 0.2)), url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=2071') center/cover;
            border-bottom: 1px solid var(--border-glass);
        }

        .profile-content {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: min(1200px, 95vw);
            display: flex;
            gap: 20px;
            align-items: flex-end;
            padding: 0 12px;
        }

        .org-logo {
            width: 120px;
            height: 120px;
            border-radius: 18px;
            border: 4px solid var(--bg-dark);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            background: #000;
            object-fit: cover;
        }

        .org-name {
            font-size: 2rem;
            color: #fff;
            font-family: var(--font-heading);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }

        .verified-badge {
            color: #00f2fe;
        }

        .container2 {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 18px 40px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 26px;
        }

        .panel {
            background: rgba(20, 22, 30, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--primary-cyan);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
            margin-bottom: 14px;
        }

        .muted {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 13px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.25);
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--primary-cyan);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <nav class="public-nav">
        <a href="../index.html" class="logo">FF <span class="text-gradient">ARENA</span></a>
        <a href="organizers.html" style="color: var(--text-muted); text-decoration: none;"><i
                class="fas fa-arrow-left"></i> Back to Directory</a>
    </nav>

    <div class="profile-header animate-fade-up">
        <div class="banner"></div>
        <div class="profile-content">
            <img id="orgLogo" src="https://ui-avatars.com/api/?name=ORG&background=000&color=fff" class="org-logo"
                alt="">
            <div style="flex:1;">
                <h1 class="org-name" id="orgName">Organizer <i class="fas fa-check-circle verified-badge"></i></h1>
                <div class="muted" id="orgMeta">Loading...</div>
            </div>
            <a class="cyber-btn" href="../tournaments/tournament.html"><i class="fas fa-trophy"></i> View
                Tournaments</a>
        </div>
    </div>

    <main class="container2">
        <div class="layout animate-fade-up delay-1">
            <div>
                <div class="panel">
                    <h2 class="section-title">Hosted Tournaments</h2>
                    <div class="cards" id="hostedWrap">
                        <div class="muted">Loading tournaments...</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2 class="section-title">Organizer Stats</h2>
                <div class="muted" id="orgStats">Loading...</div>
            </div>
        </div>
    </main>

    <script type="module" src="./organizer.js"></script>
</body>

</html>
