<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results | FF Arena</title>
    <link rel="stylesheet" href="../assets/css/app.css" />
    <style>
        body {
            font-family: var(--font-body);
            background: #070A10;
            color: var(--text);
            min-height: 100vh;
            margin: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(6, 8, 12, 0.84);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 240, 255, 0.14);
            padding: 0 18px;
            min-height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 900;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 18px;
        }

        #box {
            background: rgba(14, 18, 30, 0.84);
            border: 1px solid rgba(0, 240, 255, 0.14);
            border-radius: 16px;
            padding: 24px;
            min-height: 200px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
        }

        td {
            padding: 14px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.08);
        }

        tr:hover td {
            background: rgba(0, 240, 255, 0.03);
        }
    </style>
</head>

<body>
    <nav>
        <a class="logo" href="/index.html">FF<span style="color:var(--primary-cyan)">ARENA</span></a>
        <div style="display:flex; gap:10px;">
            <a href="/tournaments/leaderboard.html" class="cyber-btn"
                style="padding: 8px 16px; font-size: 0.8rem;">Leaderboard</a>
            <a href="/tournaments/tournament.html" class="cyber-btn"
                style="padding: 8px 16px; font-size: 0.8rem;">Tournaments</a>
        </div>
    </nav>

    <main>
        <h1 id="title" style="margin: 0 0 18px;">Tournament Results</h1>
        <div id="box">Loading results...</div>
    </main>

    <script type="module" src="./results.js"></script>
</body>

</html>
