<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | FF Arena</title>
    <meta name="theme-color" content="#FF6B00" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <style>
        :root {
            --ff-orange: #FF6B00;
            --ff-cyan: #00F0FF;
            --ff-green: #39FF14;
            --bg-darkest: #020408;
            --bg-dark: #050810;
            --bg-card: rgba(15, 22, 35, 0.92);
            --text-primary: #FFFFFF;
            --text-secondary: #A0B1C8;
            --text-muted: #6B7A8F;
            --grad-fire: linear-gradient(135deg, #FF6B00 0%, #FF1A1A 100%);
            --glow-orange: 0 0 30px rgba(255, 107, 0, 0.4);
            --font-display: 'Orbitron', sans-serif;
            --font-heading: 'Rajdhani', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: var(--font-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255, 107, 0, 0.18) 0%, transparent 55%), radial-gradient(ellipse 60% 40% at 80% 90%, rgba(0, 240, 255, 0.06) 0%, transparent 55%), linear-gradient(180deg, var(--bg-darkest), var(--bg-dark));
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 107, 0, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 107, 0, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            width: min(460px, 96vw);
            background: var(--bg-card);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), var(--glow-orange);
            overflow: hidden;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
        }

        .card::before {
            content: '';
            display: block;
            height: 3px;
            background: var(--grad-fire);
        }

        .card-head {
            padding: 28px 28px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 107, 0, 0.1);
        }

        .logo-link {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--grad-fire);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--glow-orange);
        }

        .logo-txt {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 800;
            color: var(--ff-orange);
            letter-spacing: 2px;
        }

        .logo-txt span {
            color: var(--ff-cyan);
            font-weight: 400;
        }

        .page-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .card-body {
            padding: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap:focus-within .input-icon {
            color: var(--ff-orange);
        }

        .input-wrap input {
            width: 100%;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 107, 0, 0.18);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 13px 44px 13px 42px;
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-wrap input:focus {
            border-color: var(--ff-orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.15);
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.2s;
            z-index: 2;
        }

        .toggle-pw:hover {
            color: var(--ff-orange);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--grad-fire);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: var(--font-heading);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: var(--glow-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(255, 107, 0, 0.5);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .msg {
            margin-top: 14px;
            padding: 13px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
            text-align: center;
        }

        .msg.ok {
            color: var(--ff-green);
            border: 1px solid rgba(57, 255, 20, 0.25);
            background: rgba(57, 255, 20, 0.08);
        }

        .msg.err {
            color: #ffc4c4;
            border: 1px solid rgba(255, 26, 26, 0.25);
            background: rgba(255, 26, 26, 0.08);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="card">
        <div class="card-head">
            <a href="index.html" class="logo-link">
                <div class="logo-icon"><i class="fas fa-fire"></i></div>
                <div class="logo-txt">FF<span>ARENA</span></div>
            </a>
            <div class="page-desc">Set your new account password</div>
        </div>

        <div class="card-body">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-key input-icon"></i>
                    <input id="newPassword" type="password" placeholder="Enter new password" />
                    <i class="fas fa-eye toggle-pw" onclick="togglePw('newPassword', this)"></i>
                </div>
            </div>

            <button class="submit-btn" id="resetBtn" onclick="updatePassword()">
                <i class="fas fa-save"></i> Update Password
            </button>
            <div class="msg" id="resetMsg"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fjjmlmxxbdacqmzntkvb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqam1sbXh4YmRhY3Ftem50a3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzA5MzksImV4cCI6MjA4OTMwNjkzOX0.dLMbrDMbruDyzEbmnFhHIYJqt3OLwwjEz36SAbF93uI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function togglePw(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function updatePassword() {
            const msgEl = document.getElementById('resetMsg');
            const btn = document.getElementById('resetBtn');
            const pwd = document.getElementById('newPassword').value.trim();

            if (!pwd || pwd.length < 6) {
                msgEl.className = 'msg err';
                msgEl.innerText = 'Password must be at least 6 characters.';
                msgEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            // The user must arrive at this page from the email link which sets the auth session
            const { error } = await sb.auth.updateUser({ password: pwd });

            if (error) {
                msgEl.className = 'msg err';
                msgEl.innerText = error.message;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Update Password';
            } else {
                msgEl.className = 'msg ok';
                msgEl.innerText = 'Password updated successfully! Redirecting...';
                setTimeout(() => window.location.href = 'user-login.html', 2000);
            }
            msgEl.style.display = 'block';
        }
    </script>
</body>

</html>
