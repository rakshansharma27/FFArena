<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FFArena</title>
  <meta name="description" content="Sign in to FFArena with your Google account. Access tournaments, track your stats, and win prizes.">
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(0, 240, 255, 0.1), transparent 50%),
        radial-gradient(ellipse at 70% 30%, rgba(124, 58, 237, 0.08), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>

<body>
  <div class="login-container animate-scale">
    <div class="glass-panel login-card">
      <div class="login-logo">FF<span class="text-gradient">ARENA</span></div>
      <h2>Welcome, <span class="text-gradient">Warrior</span></h2>
      <p class="subtitle">Sign in to access tournaments, wallet & stats</p>

      <button id="googleSignIn" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>

      <div class="login-divider">What you get</div>

      <div class="login-perks">
        <div class="login-perk"><i class="fas fa-check"></i> Free account with instant wallet</div>
        <div class="login-perk"><i class="fas fa-check"></i> Join unlimited tournaments</div>
        <div class="login-perk"><i class="fas fa-check"></i> Real-time stats & leaderboard</div>
        <div class="login-perk"><i class="fas fa-check"></i> Withdraw earnings via UPI</div>
      </div>

      <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script>
    // If already logged in, redirect
    (async () => {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          window.location.href = 'user-dashboard.html';
        }
      } catch (e) { }
    })();

    document.getElementById('googleSignIn').addEventListener('click', async () => {
      const btn = document.getElementById('googleSignIn');
      btn.classList.add('loading');
      btn.innerHTML = '<div class="spinner"></div> Redirecting...';

      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/user-dashboard.html'
        }
      });
      if (error) {
        alert(error.message);
        btn.classList.remove('loading');
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google';
      }
    });
  </script>
</body>

</html>
