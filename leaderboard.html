<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard - FF Arena</title>
    <link rel="stylesheet" href="../assets/css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            padding-top: 80px;
        }

        .public-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .leaderboard-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            text-align: left;
            padding: 20px;
            color: var(--primary-cyan);
            font-family: var(--font-heading);
            font-size: 0.9rem;
            border-bottom: 2px solid var(--primary-cyan);
            background: rgba(0, 0, 0, 0.3);
        }

        td {
            padding: 20px;
            color: #fff;
            border-bottom: 1px solid var(--border-glass);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        .team-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .rank {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            width: 50px;
        }

        .rank-1 td {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.1), transparent);
            border-left: 4px solid #ffd700;
        }

        .rank-1 .rank {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .rank-2 td {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.1), transparent);
            border-left: 4px solid #c0c0c0;
        }

        .rank-2 .rank {
            color: #c0c0c0;
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.5);
        }

        .rank-3 td {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.1), transparent);
            border-left: 4px solid #cd7f32;
        }

        .rank-3 .rank {
            color: #cd7f32;
            text-shadow: 0 0 10px rgba(205, 127, 50, 0.5);
        }
    </style>
</head>

<body>
    <nav class="public-nav">
        <a href="../index.html" class="logo">FF <span class="text-gradient">ARENA</span></a>
        <a href="../user/user-dashboard.html" class="cyber-btn"
            style="padding: 8px 20px; font-size: 0.8rem;">Dashboard</a>
    </nav>

    <main class="container animate-fade-up">
        <div style="text-align:center; margin-bottom: 26px;">
            <h1 class="text-gradient" style="margin:0;">Hall of Fame</h1>
            <p style="color: var(--text-muted);">Top players based on kills, matches and earnings.</p>
        </div>

        <div class="glass-panel leaderboard-container" style="padding: 0;">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: center; width: 80px;">Rank</th>
                        <th>Player</th>
                        <th>Matches</th>
                        <th>Total Kills</th>
                        <th>Total Earnings</th>
                        <th>Total Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr>
                        <td colspan="6" style="text-align:center; padding:20px; color: var(--text-muted);">
                            <i class="fas fa-spinner fa-spin"></i> Loading leaderboard...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="./leaderboard.js"></script>
</body>

</html>
