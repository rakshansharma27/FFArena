<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournaments | FF Arena</title>
    <link rel="stylesheet" href="../assets/css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            padding-top: 80px;
        }

        .public-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .t-hero {
            background: linear-gradient(to right, rgba(20, 22, 30, 0.9), transparent),
                url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070') center/cover;
            padding: 70px 40px;
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .t-badge {
            background: rgba(0, 242, 254, 0.2);
            color: var(--primary-cyan);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 12px;
            border: 1px solid var(--primary-cyan);
        }

        .t-title {
            font-size: 3rem;
            color: #fff;
            margin: 0 0 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .sub {
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 800px;
        }

        .section-title {
            color: var(--primary-cyan);
            font-size: 1.2rem;
            margin: 22px 0 12px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(20, 22, 30, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-cyan);
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
        }

        .title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            color: #fff;
        }

        .meta {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 6px;
            line-height: 1.5;
        }

        .pill {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border-glass);
            background: rgba(0, 0, 0, 0.25);
        }

        .grid2 {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .kv {
            font-size: 12px;
            color: var(--text-muted);
        }

        .kv strong {
            color: #fff;
        }

        .kv strong.c {
            color: var(--primary-cyan);
        }

        .featured-wrap {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .featured {
            border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
    </style>
</head>

<body>
    <nav class="public-nav">
        <a href="../index.html" class="logo">FF <span class="text-gradient">ARENA</span></a>
        <div style="display:flex; gap: 12px;">
            <a href="../user/user-dashboard.html" class="cyber-btn"
                style="padding: 8px 20px; font-size: 0.8rem;">Dashboard</a>
        </div>
    </nav>

    <main class="container animate-fade-up">
        <div class="t-hero delay-1">
            <div class="t-badge"><i class="fas fa-trophy"></i> ALL TOURNAMENTS</div>
            <h1 class="t-title">Battle Schedule</h1>
            <p class="sub">Featured sponsored tournaments appear on top. Click any card to view details and join using
                Wallet or UTR.</p>
        </div>

        <div class="section-title delay-2">Featured (Sponsored)</div>
        <section id="featured-wrap" class="featured-wrap delay-2"></section>

        <div class="section-title delay-3">All Tournaments</div>
        <section id="cards-wrap" class="cards delay-3"></section>
    </main>

    <script type="module" src="./tournaments-list.js"></script>
</body>

</html>
