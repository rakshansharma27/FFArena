<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizer Application Status | FF Arena</title>
    <link rel="stylesheet" href="../assets/css/app.css" />
    <style>
        body {
            background: var(--bg-dark);
            margin: 0;
            padding-top: 80px;
        }

        .public-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .card {
            max-width: 820px;
            margin: 0 auto;
            background: rgba(20, 22, 30, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 28px;
        }

        .muted {
            color: var(--text-muted);
            line-height: 1.7;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--border-glass);
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 14px;
        }

        .pending {
            color: #FFD700;
            border-color: rgba(255, 215, 0, 0.25);
            background: rgba(255, 215, 0, 0.08);
        }

        .approved {
            color: #00ff88;
            border-color: rgba(0, 255, 136, 0.25);
            background: rgba(0, 255, 136, 0.08);
        }

        .rejected {
            color: #ff4757;
            border-color: rgba(255, 71, 87, 0.25);
            background: rgba(255, 71, 87, 0.08);
        }

        .btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
    </style>
</head>

<body>
    <nav class="public-nav">
        <a href="../index.html" class="logo">FF <span class="text-gradient">ARENA</span></a>
        <a href="../user/user-dashboard.html" class="cyber-btn"
            style="padding: 8px 18px; font-size: 0.8rem;">Dashboard</a>
    </nav>

    <main class="container animate-fade-up">
        <div class="card">
            <h1 style="margin:0; color:#fff; font-family: var(--font-heading);">Organizer Application</h1>
            <p class="muted" id="statusText" style="margin-top: 10px;">Loading...</p>

            <div id="statusBadge"></div>

            <div class="btns" id="actions"></div>

            <div class="muted" style="margin-top: 18px;">
                Tip: once approved, you’ll be redirected to the admin panel automatically (or you can click the button).
            </div>
        </div>
    </main>

    <script type="module" src="./application-status.js"></script>
</body>

</html>
